spring.application.name=kursovaya-backend
spring.config.import=optional:classpath:application-local.properties

# UTF-8 в ответах (кириллица в JSON и lastMessage)
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# MySQL (установленный MySQL Server, порт 3306)
spring.datasource.url=jdbc:mysql://localhost:3306/kursovaya?createDatabaseIfNotExist=true&serverTimezone=Europe/Moscow&characterEncoding=UTF-8
spring.datasource.username=root
# Пароль — в application-local.properties (файл в .gitignore, см. application-local.properties.example)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JSON и ошибки (удобно при разработке API)
server.error.include-message=always
